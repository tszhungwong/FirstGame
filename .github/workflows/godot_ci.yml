name: Godot validation and mobile export smoke

on:
  push:
  pull_request:

env:
  GODOT_VERSION: 4.6.3

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned Godot
        shell: bash
        run: |
          curl --fail --location --retry 3 --output godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          ln -s "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$RUNNER_TEMP/godot/godot"
          echo "$RUNNER_TEMP/godot" >> "$GITHUB_PATH"
      - name: Validate assets
        run: |
          python -m unittest discover -s tools/tests -p "test_*.py" -v
          python tools/validate_paths.py
          python tools/validate_assets.py
      - name: Import and validate resources
        run: |
          python tools/run_scene_smoke.py --godot godot --godot-args --headless --import --path game
          python tools/run_scene_smoke.py --godot godot --godot-args --headless --editor --quit --path game
          python tools/run_scene_smoke.py --godot godot --expect-marker "Godot version pin and landscape ProjectSettings verified: 4.6.3" --godot-args --headless --path game --script res://tools/validate_godot_version.gd
      - name: Run GUT
        run: python tools/run_scene_smoke.py --godot godot --expect-marker "All tests passed!" --godot-args --headless --path game --script res://addons/gut/gut_cmdln.gd -gdir=res://tests -gexit
      - name: Run scene smokes
        run: |
          python tools/run_scene_smoke.py --godot godot --expect-marker COMBAT_SMOKE_OK --godot-args --headless --path game res://tests/smoke/combat_smoke.tscn
          python tools/run_scene_smoke.py --godot godot --expect-marker RUN_LOOP_SMOKE_OK --godot-args --headless --path game res://tests/smoke/run_loop_smoke.tscn
          python tools/run_scene_smoke.py --godot godot --expect-marker MOBILE_UI_SMOKE_OK --godot-args --headless --path game res://tests/smoke/mobile_ui_smoke.tscn
          python tools/run_scene_smoke.py --godot godot --expect-marker RUNTIME_SHUTDOWN_SMOKE_OK --forbid-output "ObjectDB instances leaked" --godot-args --headless --path game res://tests/smoke/runtime_shutdown_smoke.tscn

  android-debug-export:
    needs: headless-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install pinned Godot and export templates
        shell: bash
        run: |
          curl --fail --location --retry 3 --output godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          ln -s "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$RUNNER_TEMP/godot/godot"
          echo "$RUNNER_TEMP/godot" >> "$GITHUB_PATH"
          curl --fail --location --retry 3 --output templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d "$RUNNER_TEMP/templates"
          cp -R "$RUNNER_TEMP/templates/templates/." "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
      - name: Install Android SDK components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.1"
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      - name: Export Android debug APK
        shell: bash
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ runner.temp }}/android-debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          cp "$HOME/.android/debug.keystore" "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"
          mkdir -p game/builds/android
          python tools/run_scene_smoke.py --godot godot --godot-args --headless --path game --export-debug "Android" game/builds/android/game_ghost.apk
          test -s game/builds/android/game_ghost.apk
          python tools/validate_export_contents.py game/builds/android/game_ghost.apk

  ios-project-export-smoke:
    needs: headless-tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install pinned Godot and export templates
        shell: bash
        run: |
          curl --fail --location --retry 3 --output godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip -d "$RUNNER_TEMP/godot"
          ln -s "$RUNNER_TEMP/godot/Godot.app/Contents/MacOS/Godot" "$RUNNER_TEMP/godot/godot"
          echo "$RUNNER_TEMP/godot" >> "$GITHUB_PATH"
          curl --fail --location --retry 3 --output templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d "$RUNNER_TEMP/templates"
          cp -R "$RUNNER_TEMP/templates/templates/." "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable/"
      - name: Export unsigned iOS Xcode project
        shell: bash
        run: |
          mkdir -p game/builds/ios
          python tools/run_scene_smoke.py --godot godot --godot-args --headless --path game --export-debug "iOS" game/builds/ios/game_ghost.zip
          test -s game/builds/ios/game_ghost.zip
          python tools/validate_export_contents.py game/builds/ios/game_ghost.zip
